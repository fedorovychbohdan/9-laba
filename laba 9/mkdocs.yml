site_name: Ticketing System Documentation
site_description: Технічна документація системи бронювання квитків
site_author: Ksenia

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

docs_dir: docs

nav:
  - Головна: index.md
  - Архітектура:
      - Специфікація вимог (SSD): architecture/SSD.md
      - Технічний дизайн (SDD): architecture/SDD.md
      - Інфраструктура (ISD): architecture/ISD.md
      - Контракт API: api-contract.md
      - Специфікація OpenAPI: openapi.yaml
  - Якість та тестування:
      - Стратегія тестування: quality/test-strategy.md
      - План тестування: quality/test-plan.md
      - Матриця простежуваності: quality/traceability-matrix.md
  - Процеси:
      - Single Source of Truth: process/ssot.md
      - Maintenance Manual: process/maintenance.md
      - Project Roadmap: process/roadmap.md
      - Автоматизація CI/CD: ci-cd-docs.md
      - Definition of Done: definition-of-done.md
  - Інструменти:
      - Swagger UI: swagger.md
  - Інтерфейс:
      - Компоненти UI: ui-components.md
  - Контрольні питання:
      - Контрольні питання: questions.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search
  - swagger-ui-tag
